{% extends 'listings/base.html' %}
{% load static %}
{% block main %}
<div class="registerlogin-fwraper">
    <div class="login-bg">

    </div>

    <div class="registerlogin-content">
        <div class="registerlogin-content-wraper">
            <div class="registerlogin-wraper">
        
                <h2>Login</h2>

                {% if message %}
                    <div>{{ message }}</div>
                {% endif %}

                <form action="{% url 'login' %}" method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <input autofocus class="form-control" type="text" name="username" placeholder="Username">
                    </div>
                    <div class="form-group">
                        <input class="form-control" type="password" name="password" placeholder="Password">
                    </div>
                    <input class="btnlogreg" type="submit" value="Login">
                </form>
                <p style="margin-top: 15px;">Don't have an account? <a href="{% url 'register' %}">Register here.</a></p>
                
            </div>

        </div>
    </div>

</div>
{% endblock %}
