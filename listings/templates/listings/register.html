{% extends 'listings/base.html' %}
{% load static %}

{% block main %}

    <div class="register-fwraper">
        <div class="register-bg">

        </div>

        <div class="register-content">
            <div class="register-content-wraper">
                <h2>Register</h2>

                {% if message %}
                    <div>{{ message }}</div>
                {% endif %}

                <form action="{% url 'register' %}" method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <input class="form-control" autofocus type="text" name="username" placeholder="Username">
                    </div>
                    <div class="form-group">
                        <input class="form-control" type="email" name="email" placeholder="Email Address">
                    </div>
                    <div class="form-group">
                        <input class="form-control" type="password" name="password" placeholder="Password">
                    </div>
                    <div class="form-group">
                        <input class="form-control" type="password" name="confirmation" placeholder="Confirm Password">
                    </div>
                    <input class="btnlogreg" type="submit" value="Register">
                </form>
                <p style="margin-top: 15px;">Already have an account? <a href="{% url 'login' %}">Log In here.</a></p>

            </div>
               

        </div>
    </div>

{% endblock %}
